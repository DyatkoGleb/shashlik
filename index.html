<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Шашлык 2026 v 1.0.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>
    (function() {
      const version = new Date().getTime(); // уникальный timestamp
  
      // Обновляем ссылки на CSS
      document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
        if (link.href && !link.href.includes('fonts.googleapis')) { // не трогаем шрифты
          link.href = link.href.split('?')[0] + '?v=' + version;
        }
      });
  
      // Обновляем ссылки на JS (если они уже в DOM, но лучше грузить динамически)
      document.querySelectorAll('script[src]').forEach(script => {
        if (script.src && !script.src.includes('supabase')) {
          script.src = script.src.split('?')[0] + '?v=' + version;
        }
      });
    })();
  </script>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="page-header-left">
        <h1>Шашлык 2026 v 1.0.0</h1>
        <div class="sheet-url-wrap">
          <input type="url" id="sheet-url-input" class="sheet-url-input" placeholder="Вставь ссылку (например, Google Таблицы)" />
          <button type="button" class="btn btn-sheet-save" id="sheet-save-btn" title="Прикрепить к поездке">✓</button>
        </div>
      </div>
      <a href="#" id="sheet-link" class="sheet-link" target="_blank" rel="noopener noreferrer">гугл щитс</a>
    </header>

    <div id="screen-no-trip" class="create-trip-wrap visible">
      <p class="no-data">Создай поездку — получишь ссылку. Отправь её в чат, мужики откроют и добавят свои даты.</p>
      <button type="button" class="btn btn-primary" id="create-trip">Создать поездку</button>
    </div>

    <div id="screen-trip">
      <div class="trip-layout">
        <div class="trip-form">
          <div class="trip-link-wrap">
            <label>Ссылка на поездку (отправь в чат)</label>
            <input type="text" id="trip-url" readonly placeholder="После создания поездки здесь появится ссылка" />
            <button type="button" class="btn btn-secondary" id="copy-link" style="margin-top: 0.5rem;">Копировать ссылку</button>
            <p class="share-hint">Все, кто откроют ссылку, увидят общий список и смогут добавить свои даты.</p>
          </div>
          <label id="participants-list-label">Список крутых парней в количестве 0 штук:</label>
          <ul class="participants-list" id="participants-list"></ul>
          <label>Добавить себя</label>
          <input type="text" id="name" placeholder="Твоё имя" />
          <label class="label-weekends">В какие выходные можешь?</label>
          <div class="weekends" id="weekends-me"></div>

          <button type="button" class="btn btn-primary" id="btn-add-me">Добавить меня</button>

          <div class="map-section">
            <h2 class="results-title">Возможные локации</h2>
            <p class="map-hint">Клик по карте — добавить метку.</p>
            <div id="trip-map" class="trip-map-container"></div>
            <ul class="map-markers-list" id="map-markers-list"></ul>
          </div>
        </div>
        <aside class="trip-results-wrap">
          <h2 class="results-title">Лучшие даты</h2>
          <div class="results" id="results"></div>
        </aside>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="yandex-map.js"></script>
  <script src="app.js"></script>
</body>
</html>
